<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adi Pro Ultimate - Established 2025</title>
    <link rel="stylesheet" href="index.css">
    <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://esm.sh/@google/genai@^0.12.0",
          "marked": "https://esm.sh/marked@^4.0.0"
        }
      }
    </script>
</head>
<body class="persona-standard">
    <div id="ambient-bg">
        <div class="glow-sphere"></div>
        <div class="glow-sphere"></div>
    </div>
    <div id="toast-container"></div>

    <div id="settings-modal-overlay" class="hidden modal-overlay">
        <div id="settings-modal" class="modal-content glass">
            <div class="modal-header">
                <h2>Ustawienia 2026</h2>
                <button id="close-settings-btn" class="close-btn">✕</button>
            </div>
            <button onclick="window.aistudio.openSelectKey()" class="action-btn-primary gold-btn">🔑 Zmień Klucz API (Premium Access)</button>
            <p style="font-size: 0.7rem; margin: 10px 0; opacity: 0.7;">Wymagany klucz z bilingiem dla Veo/Pro: ai.google.dev/gemini-api/docs/billing</p>
            <hr>
            <button id="reset-chat-btn" class="action-btn-primary">Wyczyść Czat</button>
        </div>
    </div>

    <div id="chat-container" class="glass">
        <div id="chat-header">
            <div class="logo-wrapper">
                <h1 class="neon-logo">
                    <span class="logo-adi">Adi</span>
                    <span class="logo-pro">Pro</span>
                    <span class="logo-ultimate">Ultimate 2026</span>
                </h1>
                <small class="est-label">Est. March 2025</small>
            </div>
            <select id="persona-selector">
                <option value="standard">🤖 Standard 2026</option>
                <option value="expert">🧠 Strategic</option>
                <option value="artist">🎨 Visuals</option>
                <option value="creative">✍️ Content</option>
            </select>
            <div class="header-controls">
                <button id="settings-btn">⚙️</button>
            </div>
        </div>

        <div id="smart-tools-bar">
            <button id="search-toggle" class="tool-toggle"><span>🔍</span> Search</button>
            <button id="maps-toggle" class="tool-toggle"><span>📍</span> Maps</button>
            <button id="think-toggle" class="tool-toggle"><span>🧠</span> Think</button>
            <button id="video-toggle" class="tool-toggle"><span>🎬</span> Video</button>
            <div id="api-key-status" style="margin-left: auto;"></div>
        </div>

        <div id="messages-wrapper">
            <div id="messages"></div>
        </div>

        <div id="attachment-preview" class="hidden">
            <div id="preview-carousel"></div>
        </div>

        <div id="input-area">
            <input type="file" id="media-input-hidden" style="display: none;" accept="image/*,video/*" multiple>
            <div class="action-buttons-group">
                <button id="attach-button" class="pastel-btn lavender" title="Załącz pliki">📎</button>
            </div>
            <div class="input-wrapper">
                <input type="text" id="message-input" placeholder="W czym może Ci pomóc Adi Pro?">
            </div>
            <select id="img-size">
                <option value="1K">1K</option>
                <option value="2K" selected>2K</option>
                <option value="4K">4K</option>
            </select>
            <button id="send-button" class="pastel-btn coral">Wyślij 🚀</button>
        </div>
    </div>

    <script type="module" src="index.tsx"></script>
</body>
</html>
